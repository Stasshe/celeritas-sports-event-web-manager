name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build application
        run: pnpm build

      - name: Bump version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          pnpm version "$BUMP" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          printf 'tag=v%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update repository tree
        run: ./tree.sh

      - name: Commit and tag release
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            printf 'Tag %s already exists.\n' "$TAG" >&2
            exit 1
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json pnpm-lock.yaml tree.txt
          git commit -m "chore: release $TAG"
          git tag "$TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
